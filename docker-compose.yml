services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-complaints}
      MYSQL_USER: ${MYSQL_USER:-complaints_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_root_password}
    ports: ["3306:3306"]
    volumes: [mysql_data:/var/lib/mysql]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
  api:
    build: ./backend
    env_file: .env
    ports: ["8000:8000"]
    volumes: [./backend:/app, ./uploads:/app/uploads]
    depends_on:
      db: { condition: service_healthy }
  web:
    build: ./frontend
    ports: ["5173:80"]
    depends_on: [api]
volumes:
  mysql_data:
